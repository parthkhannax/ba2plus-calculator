<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BA II Plus Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="calculator" role="application" aria-label="BA II Plus Financial Calculator">

        <!-- ── LCD DISPLAY ── -->
        <div class="display" id="display">
          <div class="display-status">
            <span id="statusLeft"></span>
            <span id="statusRight"></span>
          </div>
          <div class="display-expr" id="displayExpr"></div>
          <output class="display-screen" id="screen" aria-live="polite">0</output>
        </div>

        <!-- ── TVM WORKSHEET PANEL ── -->
        <section class="worksheet" id="tvmPanel" aria-label="TVM Worksheet" hidden>
          <div class="ws-header">
            <span class="ws-title">TVM WORKSHEET</span>
            <button class="ws-close" id="tvmClose" aria-label="Close TVM">✕</button>
          </div>
          <div class="ws-grid">
            <label class="ws-field">
              <span class="ws-label">N <span class="ws-hint">Periods</span></span>
              <input id="tvmN" type="number" inputmode="decimal" placeholder="0" />
            </label>
            <label class="ws-field">
              <span class="ws-label">I/Y <span class="ws-hint">Annual %</span></span>
              <input id="tvmIY" type="number" inputmode="decimal" placeholder="0" />
            </label>
            <label class="ws-field">
              <span class="ws-label">PV <span class="ws-hint">Present Value</span></span>
              <input id="tvmPV" type="number" inputmode="decimal" placeholder="0" />
            </label>
            <label class="ws-field">
              <span class="ws-label">PMT <span class="ws-hint">Payment</span></span>
              <input id="tvmPMT" type="number" inputmode="decimal" placeholder="0" />
            </label>
            <label class="ws-field ws-field--full">
              <span class="ws-label">FV <span class="ws-hint">Future Value</span></span>
              <input id="tvmFV" type="number" inputmode="decimal" placeholder="0" />
            </label>
          </div>
          <div class="ws-actions">
            <button class="ws-btn" data-tvm="n">CPT N</button>
            <button class="ws-btn" data-tvm="iy">CPT I/Y</button>
            <button class="ws-btn" data-tvm="pv">CPT PV</button>
            <button class="ws-btn" data-tvm="pmt">CPT PMT</button>
            <button class="ws-btn ws-btn--wide" data-tvm="fv">CPT FV</button>
          </div>
          <p class="ws-note">Fill 4 known values → press CPT for the unknown.</p>
        </section>

        <!-- ── CF / NPV / IRR WORKSHEET PANEL ── -->
        <section class="worksheet" id="cfPanel" aria-label="Cash Flow Worksheet" hidden>
          <div class="ws-header">
            <span class="ws-title">CF WORKSHEET</span>
            <button class="ws-close" id="cfClose" aria-label="Close CF">✕</button>
          </div>
          <div class="cf-top">
            <label class="ws-field">
              <span class="ws-label">I/Y % <span class="ws-hint">Discount Rate for NPV</span></span>
              <input id="cfRate" type="number" inputmode="decimal" placeholder="e.g. 10" />
            </label>
            <div class="cf-cpt-row">
              <button class="ws-btn ws-btn--green" id="btnCptNPV">CPT NPV</button>
              <button class="ws-btn ws-btn--green" id="btnCptIRR">CPT IRR</button>
            </div>
          </div>
          <div class="cf-list" id="cfList"></div>
          <button class="ws-btn ws-btn--add" id="btnAddCF">+ Add CF Period</button>
          <p class="ws-note">CF0 = initial outflow (enter as negative). Add subsequent periods below.</p>
        </section>

        <!-- ── STO/RCL REGISTER OVERLAY ── -->
        <div class="register-overlay" id="registerOverlay" hidden>
          <div class="reg-title" id="regTitle">STO — select register 0 to 9</div>
          <div class="reg-grid" id="regGrid"></div>
          <button class="reg-cancel" id="regCancel">Cancel</button>
        </div>

        <!-- ── KEYPAD ── -->
        <div class="keypad" id="keypad">

          <!-- Row 1 -->
          <div class="krow">
            <button class="key key-nav" data-action="cpt"       ><span class="ks">QUIT</span>    <span class="kp">CPT</span>  </button>
            <button class="key key-nav" data-action="enter"     ><span class="ks">SET</span>     <span class="kp">ENTER</span></button>
            <button class="key key-nav" data-action="backspace" ><span class="ks">DEL</span>     <span class="kp">↑</span>    </button>
            <button class="key key-nav" data-action="scrollDn"  ><span class="ks">INS</span>     <span class="kp">↓</span>    </button>
            <button class="key key-nav" data-action="assign"    ><span class="ks">&nbsp;</span>  <span class="kp">=</span>    </button>
          </div>

          <!-- Row 2 -->
          <div class="krow">
            <button class="key key-2nd" data-action="2nd" id="btn2nd"><span class="ks">&nbsp;</span><span class="kp">2ND</span></button>
            <button class="key key-func" data-action="cf"  ><span class="ks">&nbsp;</span><span class="kp">CF</span>  </button>
            <button class="key key-func" data-action="npv" ><span class="ks">&nbsp;</span><span class="kp">NPV</span> </button>
            <button class="key key-func" data-action="irr" ><span class="ks">&nbsp;</span><span class="kp">IRR</span> </button>
            <button class="key key-nav"  data-action="arrow"><span class="ks">&nbsp;</span><span class="kp">→</span>  </button>
          </div>

          <!-- Row 3 – TVM keys -->
          <div class="krow">
            <button class="key key-tvm" data-action="tvm" data-target="n"  ><span class="ks">xP/Y</span>   <span class="kp">N</span>   </button>
            <button class="key key-tvm" data-action="tvm" data-target="iy" ><span class="ks">P/Y</span>    <span class="kp">I/Y</span> </button>
            <button class="key key-tvm" data-action="tvm" data-target="pv" ><span class="ks">AMORT</span>  <span class="kp">PV</span>  </button>
            <button class="key key-tvm" data-action="tvm" data-target="pmt"><span class="ks">BGN</span>    <span class="kp">PMT</span> </button>
            <button class="key key-tvm" data-action="clrTVM"               ><span class="ks">CLR TVM</span><span class="kp">FV</span>  </button>
          </div>

          <!-- Row 4 – Math top -->
          <div class="krow">
            <button class="key key-math" data-action="percent"    ><span class="ks">K</span>    <span class="kp">%</span>   </button>
            <button class="key key-math" data-action="sqrt"       ><span class="ks">&nbsp;</span><span class="kp">√x</span>  </button>
            <button class="key key-math" data-action="square"     ><span class="ks">&nbsp;</span><span class="kp">x²</span>  </button>
            <button class="key key-math" data-action="reciprocal" ><span class="ks">&nbsp;</span><span class="kp">1/x</span> </button>
            <button class="key key-op"   data-value="/"            ><span class="ks">RAND</span><span class="kp">÷</span>   </button>
          </div>

          <!-- Row 5 – Trig / parens -->
          <div class="krow">
            <button class="key key-math" data-action="inv"        ><span class="ks">HYP</span> <span class="kp">INV</span></button>
            <button class="key key-math" data-action="openParen"  ><span class="ks">SIN</span> <span class="kp">(</span>  </button>
            <button class="key key-math" data-action="closeParen" ><span class="ks">COS</span> <span class="kp">)</span>  </button>
            <button class="key key-math" data-action="power"      ><span class="ks">TAN</span> <span class="kp">yˣ</span> </button>
            <button class="key key-op"   data-value="*"            ><span class="ks">x!</span>  <span class="kp">×</span>  </button>
          </div>

          <!-- Row 6 – LN 7 8 9 − -->
          <div class="krow">
            <button class="key key-math" data-action="ln"  ><span class="ks">eˣ</span>   <span class="kp">LN</span></button>
            <button class="key key-num"  data-value="7"    ><span class="ks">DATA</span> <span class="kp">7</span> </button>
            <button class="key key-num"  data-value="8"    ><span class="ks">STAT</span> <span class="kp">8</span> </button>
            <button class="key key-num"  data-value="9"    ><span class="ks">BOND</span> <span class="kp">9</span> </button>
            <button class="key key-op"   data-value="-"    ><span class="ks">nPr</span>  <span class="kp">−</span></button>
          </div>

          <!-- Row 7 – STO 4 5 6 + -->
          <div class="krow">
            <button class="key key-mem" data-action="sto" ><span class="ks">ROUND</span>  <span class="kp">STO</span></button>
            <button class="key key-num" data-value="4"    ><span class="ks">DEPR</span>   <span class="kp">4</span>  </button>
            <button class="key key-num" data-value="5"    ><span class="ks">△%</span>     <span class="kp">5</span>  </button>
            <button class="key key-num" data-value="6"    ><span class="ks">BRKEVN</span> <span class="kp">6</span>  </button>
            <button class="key key-op"  data-value="+"    ><span class="ks">nCr</span>    <span class="kp">+</span>  </button>
          </div>

          <!-- Row 8 – RCL 1 2 3 = -->
          <div class="krow">
            <button class="key key-mem" data-action="rcl"   ><span class="ks">&nbsp;</span> <span class="kp">RCL</span></button>
            <button class="key key-num" data-value="1"      ><span class="ks">DATE</span>   <span class="kp">1</span>  </button>
            <button class="key key-num" data-value="2"      ><span class="ks">ICONV</span>  <span class="kp">2</span>  </button>
            <button class="key key-num" data-value="3"      ><span class="ks">PROFIT</span> <span class="kp">3</span>  </button>
            <button class="key key-eq"  data-action="equals"><span class="ks">ANS</span>    <span class="kp">=</span>  </button>
          </div>

          <!-- Row 9 – CE|C 0 . +/- -->
          <div class="krow krow-last">
            <button class="key key-clr" data-action="clearAll" ><span class="ks">CLR WORK</span><span class="kp">CE|C</span></button>
            <button class="key key-num" data-value="0"          ><span class="ks">MEM</span>    <span class="kp">0</span>   </button>
            <button class="key key-num" data-value="."          ><span class="ks">FORMAT</span><span class="kp">.</span>   </button>
            <button class="key key-clr" data-action="plusMinus" ><span class="ks">RESET</span>  <span class="kp">+/−</span></button>
          </div>

        </div><!-- /keypad -->

      </div><!-- /calculator -->
    </div><!-- /app-shell -->

    <script src="script.js"></script>
  </body>
</html>
